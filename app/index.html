<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101522" />
    <meta name="description" content="Waverider: a compact WebAssembly and PWA music project starter." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Waverider Studio</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Waverider Studio</p>
          <h1>Projects that run fast.</h1>
        </div>
        <section class="transport" aria-label="Transport controls">
          <button id="play-toggle" class="primary" type="button">Run</button>
          <button id="stop" type="button">Stop</button>
          <label>BPM <input id="bpm" type="number" min="40" max="240" value="112" /></label>
          <output id="engine-status">Audio idle</output>
        </section>
      </header>

      <section class="project-bar" aria-label="Project controls">
        <button id="new-project" class="primary" type="button">New project</button>
        <input id="project-name" aria-label="Project name" />
        <div id="project-list" class="project-list" aria-label="Saved projects"></div>
        <div class="meter" aria-label="Master meter"><span id="meter-fill"></span></div>
      </section>

      <section class="workspace" aria-label="Project workspace">
        <aside class="panel">
          <h2>Instruments</h2>
          <div id="instrument-list" class="instrument-list"></div>
          <label class="legato-control">Legato smoothing <output id="legato-value">0 ms</output><input id="legato" type="range" min="0" max="160" value="48" /></label>
        </aside>

        <section class="arrangement" aria-label="Arrangement">
          <div class="timeline-header"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></div>
          <div id="tracks" class="tracks"></div>
        </section>

        <aside class="panel">
          <h2>Mixer</h2>
          <div id="mixer"></div>
        </aside>
      </section>

      <section class="play-panel" aria-label="Playable instruments">
        <div>
          <h2>Drums</h2>
          <div id="pads" class="pad-grid"></div>
        </div>
        <div>
          <h2>MIDI Keyboard</h2>
          <div id="keys" class="keybed"></div>
          <p class="hint">Play with Z X C V B N M , or click the keys. Drums use A S D F G H.</p>
        </div>
      </section>
    </main>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
